<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Homes Fast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Chat Widget */
        #fl-chat-trigger {
            position: fixed; bottom: 24px; right: 24px;
            width: 56px; height: 56px; border-radius: 50%;
            background: #1a6b3c; border: none; cursor: pointer;
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
            transition: transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.2s;
        }
        #fl-chat-trigger:hover { transform: scale(1.08); box-shadow: 0 6px 32px rgba(0,0,0,0.35); }
        #fl-chat-panel {
            position: fixed; bottom: 92px; right: 24px;
            width: 340px; max-width: calc(100vw - 48px);
            background: #111; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            z-index: 99998; overflow: hidden;
            opacity: 0; transform: translateY(16px) scale(0.97);
            pointer-events: none; transition: opacity 0.25s, transform 0.25s;
        }
        #fl-chat-panel.fl-open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
        #fl-chat-header {
            background: #1a6b3c; color: #fff;
            padding: 14px 18px; display: flex; align-items: center; gap: 12px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #fl-chat-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px; color: #fff;
        }
        #fl-chat-hinfo { flex: 1; }
        #fl-chat-title { font-weight: 700; font-size: 14px; }
        #fl-chat-subtitle { font-size: 11px; opacity: 0.7; }
        #fl-chat-close {
            background: none; border: none; cursor: pointer;
            color: #fff; font-size: 18px; padding: 0; line-height: 1;
        }
        #fl-chat-msgs {
            padding: 14px; min-height: 100px; max-height: 220px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: thin; scrollbar-color: #333 transparent;
        }
        .fl-msg {
            max-width: 82%; padding: 10px 14px; border-radius: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px; line-height: 1.45;
        }
        .fl-msg.fl-bot { background: #222; color: #eee; align-self: flex-start; border-bottom-left-radius: 4px; }
        .fl-msg.fl-user { background: #1a6b3c; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .fl-typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
        .fl-typing span { width: 7px; height: 7px; background: #555; border-radius: 50%; animation: fl-bounce 1.2s infinite; }
        .fl-typing span:nth-child(2) { animation-delay: 0.2s; }
        .fl-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes fl-bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        #fl-chat-form {
            padding: 10px 14px; border-top: 1px solid #222;
            display: flex; gap: 8px;
        }
        #fl-chat-input {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            border-radius: 10px; padding: 9px 13px; color: #fff;
            font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        #fl-chat-input:focus { border-color: #1a6b3c; }
        #fl-chat-send {
            background: #1a6b3c; color: #fff; border: none;
            border-radius: 10px; padding: 9px 16px; cursor: pointer;
            font-weight: 700; font-size: 14px; transition: transform 0.15s;
        }
        #fl-chat-send:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <iframe src="https://www.ezhomesfast.com/" allow="autoplay; fullscreen" loading="eager"></iframe>

    <!-- Chat Widget -->
    <button id="fl-chat-trigger" aria-label="Open chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <div id="fl-chat-panel" role="dialog" aria-label="Chat with EZ Homes Fast">
        <div id="fl-chat-header">
            <div id="fl-chat-avatar">E</div>
            <div id="fl-chat-hinfo">
                <div id="fl-chat-title">EZ Homes Fast</div>
                <div id="fl-chat-subtitle">&#x1F7E2; Online &mdash; replies in minutes</div>
            </div>
            <button id="fl-chat-close" aria-label="Close chat">&times;</button>
        </div>
        <div id="fl-chat-msgs">
            <div class="fl-msg fl-bot">Hi! Looking to sell your home fast? We buy houses in any condition. How can we help you today?</div>
        </div>
        <form id="fl-chat-form">
            <input id="fl-chat-input" type="text" placeholder="Type a message..." autocomplete="off" />
            <button type="submit" id="fl-chat-send">&#x27A4;</button>
        </form>
    </div>

    <script>
    (function() {
        var trigger = document.getElementById('fl-chat-trigger');
        var panel = document.getElementById('fl-chat-panel');
        var form = document.getElementById('fl-chat-form');
        var input = document.getElementById('fl-chat-input');
        var msgs = document.getElementById('fl-chat-msgs');
        var closeBtn = document.getElementById('fl-chat-close');
        var isOpen = false;

        function addMsg(text, type) {
            var el = document.createElement('div');
            el.className = 'fl-msg fl-' + type;
            el.textContent = text;
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function showTyping() {
            var el = document.createElement('div');
            el.className = 'fl-msg fl-bot fl-typing';
            el.innerHTML = '<span></span><span></span><span></span>';
            el.id = 'fl-typing-indicator';
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function hideTyping() {
            var el = document.getElementById('fl-typing-indicator');
            if (el) el.remove();
        }

        function togglePanel() {
            isOpen = !isOpen;
            panel.classList.toggle('fl-open', isOpen);
            if (isOpen) { setTimeout(function() { input.focus(); }, 280); }
        }

        trigger.addEventListener('click', togglePanel);
        if (closeBtn) closeBtn.addEventListener('click', togglePanel);

        var botReplies = [
            "Thanks for reaching out! We buy houses in any condition — no repairs needed. What's the address of the property?",
            "Great! We can typically make a fair cash offer within 24 hours. Would you like to schedule a quick call?",
            "We close on your timeline — as fast as 7 days. No fees, no commissions. Want to get started?"
        ];
        var replyIndex = 0;

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var msg = input.value.trim();
            if (!msg) return;
            addMsg(msg, 'user');
            input.value = '';
            showTyping();
            setTimeout(function() {
                hideTyping();
                addMsg(botReplies[replyIndex % botReplies.length], 'bot');
                replyIndex++;
            }, 900 + Math.random() * 400);
        });
    })();
    </script>
</body>
</html>
